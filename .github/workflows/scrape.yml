name: Scrape FlashScore

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instaliraj zavisnosti
        run: pip install -r requirements.txt

      - name: Instaliraj Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Pokreni scraper
        run: python run_scrape.py

      - name: Commit i push podataka
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/
          git diff --staged --quiet || git commit -m "data: $(date -u '+%H:%M')"
          git diff --staged --quiet || git push
          git push
